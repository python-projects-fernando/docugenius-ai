services:
  db:
    image: mysql:8.0
    container_name: docugenius_ai_db
    environment:
        MYSQL_ROOT_PASSWORD: "fakeRootPassword123!"
        MYSQL_DATABASE: "docugenius_ai_dev"
        MYSQL_USER: "dev_user"
        MYSQL_PASSWORD: "fakeUserPassword456@"
    ports:
      - "3306:3306"
    volumes:
      - mysql_:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h 127.0.0.1 -u dev_user -p$$MYSQL_PASSWORD -e 'SELECT 1'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: docugenius_ai_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.development
    container_name: docugenius_ai_backend
    ports:
      - "8000:8000"
    environment:
      INITIAL_ADMIN_PASSWORD: "FakeAdminSecurePass789!"
      INITIAL_USER_PASSWORD: "FakeUserSecurePass012@"
      JWT_SECRET_KEY: "fake_super_secret_jwt_key_for_dev"
      JWT_REFRESH_SECRET_KEY: "fake_super_secret_refresh_key_for_dev"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      DATABASE_URL: "mysql+aiomysql://dev_user:fakeUserPassword456%@db:3306/docugenius_ai_dev"
      HF_API_TOKEN: "hf_fakeTokenForExampleAbCdEfGhIjKlMnOpQrStUvWxYz"
      HF_OPENAI_BASE_URL: "https://fake-router.huggingface.co/v1"
      AWS_ACCESS_KEY_ID: "FAKEAKIAXXXXXXXXXXX"
      AWS_SECRET_ACCESS_KEY: "fake_secret_access_key_xxxxxxxxxxxxxxxxxxxx"
      AWS_S3_BUCKET_NAME: "my-docugenius-dev-bucket"
      AWS_S3_REGION: "us-east-1"
      STORAGE_BACKEND: "S3"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      SMTP_SERVER: "smtp.fakemail.com"
      SMTP_PORT: "587"
      EMAIL_ADDRESS: "test@example.com"
      EMAIL_PASSWORD: "fake_smtp_password_abc123"
      BASE_URL: "http://localhost:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mysql_: